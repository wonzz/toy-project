version: '3.8'

services:
  fastapi-app:
    build: ./app
    container_name: fastapi-app
    ports:
      - "8000:8000"
    networks:
      - monitoring-net

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring-net
    depends_on:
      - fastapi-app

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring-net
    depends_on:
      - prometheus

  locust:
    image: locustio/locust
    container_name: locust
    ports:
      - "8089:8089"
    volumes:
      - ./locust:/mnt/locust
    command: -f /mnt/locust/locustfile.py --host http://fastapi-app:8000
    networks:
      - monitoring-net

networks:
  monitoring-net:
    driver: bridge
